kind = "web"
previewPath = "/"
title = "ChainBridge SCF Command Simulator"
version = "1.0.0"
id = "artifacts/chainbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19794

[services.development]
run = "pnpm --filter @workspace/chainbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chainbridge", "run", "build" ]
publicDir = "artifacts/chainbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19794"
BASE_PATH = "/"
